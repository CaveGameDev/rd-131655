<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta content="width=device-width,initial-scale=1" name="viewport"/>
        <title>rd</title>
        <script type="importmap">
            {
                "imports": {
                    "three": "/3.js"
                }
            }</script>
        <style>
            html,body {
                height: 100%;
                margin: 0;
                padding: 0
            }

            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #000;
                font-family: "Noto Sans",Arial,sans-serif
            }

            canvas {
                display: block;
                cursor: none;
                width: 100%;
                height: 100%
            }

            #ui {
                position: absolute;
                top: 10px;
                left: 10px;
                color: #fff;
                font-size: 14px;
                z-index: 100;
                pointer-events: none
            }

            #keyCanvas {
                position: fixed;
                top: 10px;
                right: 10px;
                width: 46px!important;
                height: 50px!important;
                z-index: 101;
                pointer-events: none;
                image-rendering: crisp-edges;
                image-rendering: -webkit-optimize-contrast;
                display: none
            }

            #keyCanvas.active {
                display: block
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <div id="ui"></div>
        <canvas id="keyCanvas" width="46" height="50"></canvas>
        <!-- Signal main.js to use full-window canvas sizing when loaded in this fullscreen helper page -->
        <script>
          window.__FS_FULLSIZE = true;
        </script>
        <script type="module" src="./main.js"></script>

        <script>
          // Listen for a world blob handed from the opener and immediately attempt upload when requested.
          window.addEventListener('message', async (ev) => {
            try {
              const origin = location.origin;
              // ensure messages are same-origin for safety
              if (ev.origin !== origin) return;
              const data = ev.data || {};
              if (!data.worldBlobUrl) return;
              if (!data.autoUpload) return;
              // fetch the blob URL, wrap as a File, and POST to /upload
              const resp = await fetch(data.worldBlobUrl);
              if (!resp.ok) throw new Error('Failed to fetch world blob: ' + resp.status);
              const ab = await resp.arrayBuffer();
              const file = new File([ab], 'level.dat', { type: 'application/octet-stream' });
              const fd = new FormData();
              fd.append('file', file);
              // Try uploading to /upload (server endpoint expected); report result
              const up = await fetch('/upload', { method: 'POST', body: fd });
              if (up.ok) {
                try { alert('Upload succeeded'); } catch (e) { /* ignore */ }
              } else {
                try { alert('Upload failed: ' + up.status + ' ' + up.statusText); } catch (e) {}
              }
            } catch (err) {
              console.warn('Auto-upload failed', err);
              try { alert('Auto-upload failed: ' + err.message); } catch (e) {}
            }
          }, false);
        </script>
        <script src="icon.js"</script>
    </body>
</html>
